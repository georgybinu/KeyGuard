version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://keyguard:keyguard@postgres:5432/keyguard_db
      - ENVIRONMENT=development
    depends_on:
      - postgres
    volumes:
      - ./backend:/app/backend
      - ./ml:/app/ml
    command: python app.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: npm run dev

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=keyguard
      - POSTGRES_PASSWORD=keyguard
      - POSTGRES_DB=keyguard_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyguard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
